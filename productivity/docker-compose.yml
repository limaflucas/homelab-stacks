services:
  # --- Database ---
  postgres:
    image: postgres:15-alpine
    container_name: productivity-postgres
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Cache ---
  redis:
    image: redis:7-alpine
    container_name: productivity-redis
    restart: always
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Storage (S3 Compatible for Outline) ---
  minio:
    image: minio/minio
    container_name: productivity-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - ./data/minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  # --- Bitwarden (Vaultwarden) ---
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: productivity-vaultwarden
    restart: always
    environment:
      - DATABASE_URL=postgresql://vaultwarden:${POSTGRES_PASSWORD}@postgres:5432/vaultwarden
      - SIGNUPS_ALLOWED=true
    volumes:
      - ./data/vaultwarden:/data
    ports:
      - "8080:80"
    depends_on:
      postgres:
        condition: service_healthy

  # --- Outline Wiki ---
  outline:
    image: docker.getoutline.com/outlinewiki/outline:latest
    container_name: productivity-outline
    restart: always
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - ./data/outline:/var/lib/outline/data

  # --- OIDC Provider (Required for Outline Login) ---
  # Note: Outline requires an OIDC provider (Google, Slack, or self-hosted like Authelia)
  authelia:
    image: authelia/authelia:latest
    container_name: productivity-authelia
    restart: always
    volumes:
      - ./authelia:/config
    ports:
      - "9091:9091"
